<div class="auth-container">
  <div class="lang-switcher">
    <button (click)="translate.use('ru')" [class.active]="'ru' === translate.getCurrentLang()">RU</button>
    <button (click)="translate.use('kk')" [class.active]="'kk' === translate.getCurrentLang()">KZ</button>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-dot"></div>
      <span>qPortal</span>
    </div>

    <h2 class="auth-title">{{ 'AUTH_REGISTER_TITLE' | translate }}</h2>
    <p class="auth-subtitle">{{ 'AUTH_REGISTER_SUBTITLE' | translate }}</p>

    <form (ngSubmit)="onRegister()">
      <div class="form-group">
        <label class="form-label">{{ 'LABEL_FULL_NAME' | translate }}</label>
        <input type="text" name="username" placeholder="{{ 'PLACEHOLDER_FULL_NAME' | translate }}" class="form-input" [(ngModel)]="registerData.username" required>
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'LABEL_IIN' | translate }}</label>
        <input type="text" name="iin" placeholder="{{ 'PLACEHOLDER_IIN' | translate }}" class="form-input" maxlength="12" [(ngModel)]="registerData.iin" required>
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'LABEL_EMAIL' | translate }}</label>
        <input type="email" name="email" placeholder="name@example.com" class="form-input" [(ngModel)]="registerData.email" required>
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'LABEL_PASSWORD' | translate }}</label>
        <input type="password" name="password" placeholder="••••••••" class="form-input" [(ngModel)]="registerData.password" required>
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'LABEL_CONFIRM_PASSWORD' | translate }}</label>
        <input type="password" name="confirmPassword" placeholder="••••••••" class="form-input" [(ngModel)]="registerData.confirmPassword" required>
      </div>

      <div class="error-message-block" *ngIf="errorMessage" style="color: #dc3545; margin-bottom: 15px; font-size: 14px; text-align: left;">
        ⚠️ {{ errorMessage }}
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading">
        {{ (isLoading ? 'BTN_CREATING' : 'BTN_REGISTER') | translate }}
      </button>
    </form>

    <div class="auth-toggle">
      {{ 'AUTH_ALREADY_HAVE_ACCOUNT' | translate }}
      <a routerLink="/auth" class="auth-link">{{ 'AUTH_LOGIN_LINK' | translate }}</a>
    </div>
  </div>
</div>
<app-footer></app-footer>
