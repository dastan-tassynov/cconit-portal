<div class="landing-layout">
  <header class="main-content-header">
    <div class="sidebar-brand"><span>ЦОНИТ</span></div>
    <div class="header-actions">
      <div class="landing-language">
        <app-language-switcher></app-language-switcher>
      </div>
      <button (click)="goToLogin()" class="auth-btn">👤</button>
    </div>
  </header>

  <main class="content-wrapper">
    <section class="hero">
      <img src="favicon.ico" alt="ЦОНИТ" class="hero-icon">
      <h1>{{ 'hero_title' | translate }}</h1>
      <p class="hero-description">{{ 'hero_desc' | translate }}</p>

      <div class="features-grid">
        <div class="feature-card">
          <div class="feature-icon">🔬</div>
          <h4>{{ 'dir_1' | translate }}</h4>
          <p>{{ 'dir_1_desc' | translate }}</p>
        </div>
        <div class="feature-card">
          <div class="feature-icon">💻</div>
          <h4>{{ 'dir_2' | translate }}</h4>
          <p>{{ 'dir_2_desc' | translate }}</p>
        </div>
        <div class="feature-card">
          <div class="feature-icon">📈</div>
          <h4>{{ 'dir_3' | translate }}</h4>
          <p>{{ 'dir_3_desc' | translate }}</p>
        </div>
      </div>
    </section>

    <section class="projects-section">
      <h3>Проекты</h3>
      <div class="pdf-slider">
        <div *ngFor="let doc of pdfList" class="pdf-card">
          <div class="pdf-icon">📄</div>
          <span class="pdf-name">{{ doc.name }}</span>
          <!-- Передаем ID в функцию -->
          <button (click)="openPdf(doc.id)" class="btn-open">Открыть PDF</button>
        </div>
      </div>
    </section>
    <div *ngIf="selectedPdf" class="pdf-viewer-overlay">
      <div class="pdf-viewer-container">
        <button (click)="closePdf()" class="close-btn">Закрыть ✖</button>
        <pdf-viewer
          [src]="selectedPdf"
          [render-text]="true"
          style="display: block; width: 100%; height: 700px;">
        </pdf-viewer>
      </div>
    </div>
  </main>
</div>
<app-footer></app-footer>
